    <script>
        function countvow(word) {
            let count = 0;
            for(const element of word) {
                if(vowels.includes(element)) {
                    count += 1;
                }
            }
            return count;
        }

        let word = 'Raauf';
        let vowels = ['a','e','i','o','u','A','E','I','O','U',];
        let total = countvow(word);
        console.log(total);
    </script>
