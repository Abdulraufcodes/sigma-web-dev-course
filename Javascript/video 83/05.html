<body>
    <script>
        function sum(arr) {
            let sum = 0;
            for(const element of arr) {
                if(element < 0) {
                    break;
                }
                else {
                 sum += element;
                }
            }
            return sum;
        }
        
        let arr = [1,2,-1,3,4];
        let total = sum(arr)
        console.log(total);
    </script>
</body>
