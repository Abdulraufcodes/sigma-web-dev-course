        async function multiplier(arr) {
            return arr.map (e => 
                new Promise((resolve,reject) => {
                    setTimeout(() => {
                        resolve(e*2);

                    }, 500);
                })
            )
        }

        (async function getnewarr() {
            let arr = [1,2,3,4];
            let promises = await multiplier(arr);
            let result = await Promise.all(promises);
            console.log(result)
