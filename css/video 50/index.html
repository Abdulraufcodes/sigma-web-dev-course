<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS filters</title>
    <style>
        .img1{
            filter: blur(30px);
        }
        .img2{
            filter: grayscale(70%);
        }
        .img3{
            filter: invert(3.5);
        }
    </style>
</head>
<body>
    <img class="img1"  src="https://tse3.mm.bing.net/th?id=OIP.i3A68YOaeKJvLzd9fe3C7AAAAA&pid=Api&P=0&h=180" alt="">
    <img class="img2"  src="https://tse4.mm.bing.net/th?id=OIP.JLBuNJNBBWmIKn8VeiS-9AHaE8&pid=Api&P=0&h=180" alt="">
    <img class="img3"  src="https://tse2.mm.bing.net/th?id=OIP.6k1uFyzltK4ZzoghtKQABwHaD5&pid=Api&P=0&h=180" alt="">
</body>
</html>
