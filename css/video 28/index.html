<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS position property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            width: 80vw;
            height: 20vh;
            margin: 3px;
            padding: 4px;
            border: 2px solid black;

        }

        .parent{
            margin: 30px;
            padding:20px;
            border: 3px solid purple;
            height: 120vh;
           
        }

        .box1 {
            background-color: aqua;
            position: sticky;
            margin: 0;
            padding: 0;
            height: 30px;
            width: 70vw;


            /* position: absolute; */
        }

        .box2 {
            /* position: relative;  this will allow us to change the position */
            top: 20px;
            left: 20px;
            background-color: beige;
        }

        .box3 {
            background-color: #0c8e51;
            
        }

        .box4 {
            background-color: #6c1d99;
            height: 50px;
            width: 40vw;
            margin: auto;
            position: fixed;
        }

    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>

</body>

</html>
