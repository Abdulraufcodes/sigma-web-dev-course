<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 121px;
            width: 121px;
            background-color: red;
            /* border-radius: 70px; */
            position: absolute;
            bottom: 0;
            left: 0; 
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: anime-in-X 3s linear  infinite,
                       anime-in-Y 1s ease-out  infinite  alternate;
                         
        }

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }

        @keyframes anime-in-X {
            from{
                left: 0%;
                
            }
            to{
                left: 100%;
                transform: rotateZ(360deg);
            }

        }

        @keyframes anime-in-Y {
            from{
                bottom: 0%;
            }
            to{
                bottom: 100%;
            }
        }
 
    </style>
</head>

<body>
    <div class="container">

        <div class="box">
        </div>
    </div>
    <!-- 
   
     -->
</body>

</html>
