<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dynamic website builder</title>
    <style>
        .card {
            display: flex;
            width: 60vw;
            height: 103px;
            border: 2px solid black;
            
            
        }
        .thumbnail {
            position: relative;
            margin-left: 10px;
        }
        .thumbnail > img {
            
            height: 99px;
        }
        .duration {
            position: absolute;
            color: white;
            background-color: rgba(46, 41, 41, 0.475);
            z-index: 10;
            bottom: 10px;
            right: 9px;
            font-size: 12px;
            padding: 3px;
            border-radius: 4px;
        }
        
    </style>
</head>
<body>
    <div class="container">

        <div class="card">
            <div class="thumbnail">
                <img src="https://i.ytimg.com/vi/tVzUXW6siu0/hqdefault.jpg?sqp=-oaymwEmCKgBEF5IWvKriqkDGQgBFQAAiEIYAdgBAeIBCggYEAIYBjgBQAE=&rs=AOn4CLB6VzxANxt3dHm91HW9lLfDlxvmuA" alt="">
                <div class="duration">31:04</div>
            </div>
            
            <div class="title">
                <h1>Intoduction to Backend | sigma web development #2</h1>
                <p>codewithrauf.300k views. 7 months ago</p>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
