<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar design</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        :root{
            --color:rgb(53, 180, 95);
            --seccolor:rgb(235, 241, 241);
            --bordercolor:rgb(163, 30, 119);
        }
        div{
            background-color: var(--color);
            height: 50px;
            margin: 20px;
        }
        ul{
            display: flex;
            list-style: none;
        }
        ul li{
            padding: 2px 10px;
            margin: 10px;
            border: 2px solid var(--bordercolor);
            border-radius: 5px;
            color: var(--seccolor);
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <div>
        <ul>
            <li>Home </li>
            <li>About </li>
            <li>Feedback </li>
            <li>Contacts </li>
            <li>Help </li>
        </ul>
    </div>
</body>
</html>
